version: '3.8'

services:
  postgres:
    image: postgres:13-alpine
    container_name: my-postgres
    restart: "no"
    ports:
      - "5432:5432"
    # This explicitly forces Docker Compose to read your .env file
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}